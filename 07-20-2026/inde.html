<!DOCTYPE html>
<html>
<head>
<style>
    /* 1. BOX MODEL CONCEPTS */
    body {
        font-family: sans-serif;
        margin: 0;
    }

    .box {
        /* Content size */
        width: 200px;
        height: 150px;
        
        /* Box Model: Padding (space inside) */
        padding: 20px;
        
        /* Box Model: Border */
        border: 5px solid black;
        
        /* Box Model: Margin (space outside) */
        margin: 10px;
        
        background-color: lightblue;
    }

    /* 2. FLEXBOX CONCEPTS */
    .container {
        /* Turn on Flexbox */
        display: flex;
        
        /* Align items in the center of the screen */
        justify-content: center;
        
        /* Add space between boxes */
        gap: 20px;
        
        /* Just for demo: give container a background */
        background-color: #eee;
        padding: 50px;
    }
</style>
</head>
<body>

    <h2 style="text-align:center">Simple Flexbox & Box Model</h2>

    <!-- The Flex Container -->
    <div class="container">
        
        <!-- The Boxes (using Box Model properties) -->
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>

    </div>

</body>
</html>
