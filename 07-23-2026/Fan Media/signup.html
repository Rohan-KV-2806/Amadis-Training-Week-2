<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAN Media - Sign Up</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <header>
        <h1>FAN Media</h1>
    </header>

    <div class="form-box">
        <label for="uname">Create a username:</label>
        <input type="text" name="username" id="uname" placeholder="Choose a username">
        <label for="pass">Create a strong password:</label>
        <input type="password" name="password" id="pass" placeholder="Enter a password">
        <button onclick="signup()">📝 Sign Up</button>
        <div class="auth-links">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <footer>
        <h2>FAN media by Rohan</h2>
    </footer>

    <script src="scripts/auth.js"></script>
</body>
</html>
